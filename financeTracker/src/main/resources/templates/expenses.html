<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Expenses</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>


<body>

    <!-- Navbar -->

    <div th:replace="~{fragments/navbar :: navbar}">
    </div>


    <main class="container">

        <h1>Expense Management</h1>


        <!-- Add Expense -->

        <div class="form-container">

            <h2>Add Expense</h2>


            <form th:action="@{/expenses/add}"
                  th:object="${expense}"
                  method="post">


                <label>
                    Category:
                </label>


                <select th:field="*{category}"
                        required>

                    <option value="">
                        Select Category
                    </option>

                    <option value="Food">
                        Food
                    </option>

                    <option value="Travel">
                        Travel
                    </option>

                    <option value="Shopping">
                        Shopping
                    </option>

                    <option value="Bills">
                        Bills
                    </option>

                    <option value="Entertainment">
                        Entertainment
                    </option>

                    <option value="Healthcare">
                        Healthcare
                    </option>

                    <option value="Other">
                        Other
                    </option>

                </select>


                <br><br>


                <label>
                    Amount:
                </label>


                <input type="number"
                       th:field="*{amount}"
                       step="0.01"
                       min="0.01"
                       required>


                <br><br>


                <label>
                    Date:
                </label>


                <input type="date"
                       th:field="*{expenseDate}"
                       required>


                <br><br>


                <label>
                    Description:
                </label>


                <input type="text"
                       th:field="*{description}"
                       placeholder="Enter description">


                <br><br>


                <button type="submit">

                    Add Expense

                </button>

            </form>

        </div>


        <hr>


        <!-- Expense History -->

        <h2>Expense History</h2>


        <table>

            <thead>

                <tr>

                    <th>
                        Category
                    </th>

                    <th>
                        Amount
                    </th>

                    <th>
                        Date
                    </th>

                    <th>
                        Description
                    </th>

                    <th>
                        Action
                    </th>

                </tr>

            </thead>


            <tbody>

                <tr th:each="expense : ${expenseList}">

                    <td th:text="${expense.category}">
                    </td>


                    <td>

                        ₹
                        <span th:text="${expense.amount}">
                        </span>

                    </td>


                    <td th:text="${expense.expenseDate}">
                    </td>


                    <td th:text="${expense.description}">
                    </td>


                    <td>

                        <a th:href="@{/expenses/delete/{id}
                            (id=${expense.id})}">

                            Delete

                        </a>

                    </td>

                </tr>


                <!-- Show message when there are no expenses -->

                <tr th:if="${#lists.isEmpty(expenseList)}">

                    <td colspan="5">

                        No expenses added yet.

                    </td>

                </tr>

            </tbody>

        </table>


        <br>

    </main>

</body>

</html>
