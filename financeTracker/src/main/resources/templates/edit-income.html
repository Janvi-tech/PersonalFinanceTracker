<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Income</title>

</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1>Edit Income</h1>

    <form th:action="@{/income/update}"
          th:object="${income}"
          method="post">

        <input type="hidden"
               th:field="*{id}">

        <label>Source:</label>

        <input type="text"
               th:field="*{source}"
               required>

        <br><br>

        <label>Amount:</label>

        <input type="number"
               th:field="*{amount}"
               step="0.01"
               required>

        <br><br>

        <label>Date:</label>

        <input type="date"
               th:field="*{incomeDate}"
               required>

        <br><br>

        <label>Description:</label>

        <input type="text"
               th:field="*{description}">

        <br><br>

        <button type="submit">
            Update Income
        </button>

    </form>

</body>

</html>
